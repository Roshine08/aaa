<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Authenticator — Roshine Account Store</title>
  <link rel="icon" href="/assets/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#05060b;
      --text:#e7efff;
      --muted:#9aa8c6;

      --neon:#29b6ff;
      --neon2:#b77cff;
      --neon3:#33ffcc;

      --shadow: 0 26px 72px rgba(0,0,0,.62);
      --shadow2: 0 10px 26px rgba(0,0,0,.42);

      --r: 22px;
      --r2: 999px;
      --w: min(1100px, 92vw);

      --btn-bg: rgba(255,255,255,.03);
      --btn-border: rgba(255,255,255,.10);
      --btn-hover-bg: rgba(255,255,255,.060);
      
      --glass-bg: rgba(10, 14, 22, 0.5);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: 'Outfit', sans-serif;
      color:var(--text);
      background: var(--bg);
      overflow-x:hidden;
      line-height: 1.6;
    }

    /* Background Effects */
    .bg-animation {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: var(--bg);
    }
    #bg-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .bg-animation::before, .bg-animation::after, .bg-animation-3 {
      content: ''; position: absolute; border-radius: 50%;
      filter: blur(120px); opacity: 0.15;
      animation: float 20s infinite alternate ease-in-out;
    }
    .bg-animation::before {
      width: 50vw; height: 50vw; background: var(--neon);
      top: -10%; left: -10%;
    }
    .bg-animation::after {
      width: 60vw; height: 60vw; background: var(--neon2);
      bottom: -20%; right: -10%; animation-delay: -5s;
    }
    .bg-animation-3 {
      content: ''; position: absolute; border-radius: 50%;
      filter: blur(120px); opacity: 0.12;
      animation: float 20s infinite alternate ease-in-out;
      width: 40vw; height: 40vw; background: var(--neon3);
      top: 40%; left: 30%; animation-delay: -10s;
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 10%) scale(1.1); }
    }

    .scanlines {
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px; opacity: 0.5;
    }

    a{ color:inherit; text-decoration:none; }
    .wrap{ width:var(--w); margin:0 auto; padding:22px 0 70px; position:relative; z-index:1; }

    /* ===== Neon gradient border hover (core) ===== */
    .neon-border{
      position:relative;
      overflow:hidden;
      border:1px solid var(--btn-border);
      background: var(--btn-bg);
      box-shadow:
        0 18px 48px rgba(0,0,0,.42),
        0 0 0 1px rgba(255,255,255,.03) inset;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: transform .15s ease, background .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .neon-border::after{
      content:"";
      position:absolute;
      inset:-1px;
      padding:1px;
      border-radius: inherit;
      background: linear-gradient(120deg, rgba(41,182,255,.0), rgba(41,182,255,.65), rgba(183,124,255,.65), rgba(51,255,204,.45), rgba(41,182,255,.0));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity:0;
      transition: opacity .18s ease;
      pointer-events:none;
    }
    .neon-border::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(600px 180px at 20% 0%, rgba(255,255,255,.14), transparent 55%),
        radial-gradient(520px 200px at 85% 15%, rgba(41,182,255,.20), transparent 55%),
        radial-gradient(520px 220px at 50% 120%, rgba(183,124,255,.14), transparent 60%);
      opacity:0;
      transition: opacity .18s ease;
      pointer-events:none;
    }
    .neon-border:hover{
      transform: translateY(-1px);
      background: var(--btn-hover-bg);
      border-color: rgba(255,255,255,.14);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05) inset,
        0 22px 56px rgba(0,0,0,.60),
        0 0 38px rgba(41,182,255,.16),
        0 0 30px rgba(183,124,255,.11);
    }
    .neon-border:hover::after{ opacity:1; }
    .neon-border:hover::before{ opacity:1; }

    .header {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: 95%; max-width: 1200px; z-index: 100;
      background: rgba(18,22,34,0.58);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 99px;
      padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; gap: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }
    .brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .brand img { width: 32px; height: 32px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .brand .name { font-weight: 800; font-size: 1.1rem; letter-spacing: 0.15em; color: #fff; white-space: nowrap; }
    .nav { display: flex; gap: 24px; flex-wrap: nowrap; }
    .nav a { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); transition: all 0.3s; }
    .nav a:hover { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

    .header-actions { display: flex; gap: 12px; align-items: center; }
    .lang-select {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      color: var(--text); padding: 8px 16px; border-radius: 20px;
      font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer;
      outline: none; appearance: none; -webkit-appearance: none; text-align: center;
    }
    .lang-select option { background: #070a12; color: #fff; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 11px 24px; border-radius: 99px; font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.06em; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      cursor: pointer; text-transform: uppercase; position: relative; overflow: hidden; text-align: center;
    }
    .btn-outline {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--text); backdrop-filter: blur(10px);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    /* ===== Page ===== */
    .page{
      min-height: calc(100svh - 130px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 34px 0 0;
    }

    .panel{
      width:min(720px, 92vw);
      padding: 26px 20px;
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.18));
      border: 1px solid rgba(255,255,255,.06);
      box-shadow:
        var(--shadow),
        0 0 0 1px rgba(255,255,255,.035) inset,
        0 0 34px rgba(41,182,255,.06),
        0 0 26px rgba(183,124,255,.05);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position:relative;
      overflow:hidden;
      z-index:1;
    }
    .panel::before{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(900px 240px at 20% 0%, rgba(41,182,255,.10), transparent 58%),
        radial-gradient(900px 260px at 85% 12%, rgba(183,124,255,.09), transparent 60%);
      opacity:.55;
      pointer-events:none;
    }
    .panel::after{
      content:"";
      position:absolute;
      inset:-40%;
      background: linear-gradient(90deg, transparent, rgba(41,182,255,.14), transparent);
      transform:rotate(12deg);
      animation:sweep 7.2s linear infinite;
      opacity:.26;
      pointer-events:none;
    }
    @keyframes sweep{
      0%{ transform:translateX(-35%) rotate(12deg); opacity:0; }
      12%{ opacity:.26; }
      70%{ opacity:.14; }
      100%{ transform:translateX(35%) rotate(12deg); opacity:0; }
    }

    .panel-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }
    .panel-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:12px;
      color:rgba(231,239,255,.82);
    }

    .code{
      text-align:center;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(42px, 7.6vw, 78px);
      font-weight:900;
      letter-spacing:.18em;
      margin: 18px 0 10px;
      color:rgba(231,239,255,.92);
      text-shadow:
        0 0 24px rgba(41,182,255,.10),
        0 0 20px rgba(183,124,255,.08);
      position:relative;
      z-index:1;
    }

    .hint{
      text-align:center;
      color: rgba(154,168,198,.82);
      font-size: 13px;
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }

    .barwrap{
      height:12px;
      background: rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,.03) inset;
      position:relative;
      z-index:1;
    }
    .bar{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(41,182,255,.45), rgba(41,182,255,.95), rgba(183,124,255,.55));
      background-size:200% 100%;
      animation: stripe 1.3s linear infinite;
      transition:width .15s linear;
    }
    @keyframes stripe{
      0%{ background-position:0% 0; }
      100%{ background-position:200% 0; }
    }

    .field-label{
      margin-top:20px;
      font-size:13px;
      color: rgba(231,239,255,.78);
      font-weight:700;
      letter-spacing:.04em;
      position:relative;
      z-index:1;
    }
    input{
      width:100%;
      margin-top:10px;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      color: rgba(231,239,255,.92);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      outline:none;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.03),
        0 0 0 1px rgba(41,182,255,.10);
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
      position:relative;
      z-index:1;
    }
    input::placeholder{ color: rgba(154,168,198,.65); }
    input:focus{
      border-color: rgba(41,182,255,.38);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 0 0 2px rgba(41,182,255,.24),
        0 0 34px rgba(41,182,255,.12);
      background: rgba(255,255,255,.045);
    }

    .row{
      display:flex;
      gap:12px;
      margin-top:18px;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }
    button{
      flex:1 1 180px;
      height:44px;
      border-radius:16px;
      color: rgba(231,239,255,.92);
      font-weight:700;
      letter-spacing:.08em;
      font-size:12px;
      cursor:pointer;
      background: transparent;
      border:1px solid rgba(255,255,255,.10);
    }

    /* ===== Primary button synced with Page A ===== */
    button.primary{
      background:
        conic-gradient(
          from 210deg,
          rgba(41,182,255,.22),
          rgba(183,124,255,.16),
          rgba(51,255,204,.12),
          rgba(41,182,255,.22)
        ),
        linear-gradient(180deg, rgba(41,182,255,.14), rgba(183,124,255,.06));
      background-blend-mode: screen, normal;
      border:1px solid rgba(41,182,255,.34);
      box-shadow:
        0 18px 52px rgba(0,0,0,.44),
        0 0 40px rgba(41,182,255,.20),
        0 0 28px rgba(183,124,255,.12),
        0 0 0 1px rgba(255,255,255,.03) inset;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position:relative;
      overflow:hidden;
      transition: transform .15s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
    }
    button.primary:hover{
      transform: translateY(-1px);
      background:
        conic-gradient(
          from 210deg,
          rgba(41,182,255,.30),
          rgba(183,124,255,.22),
          rgba(51,255,204,.16),
          rgba(41,182,255,.30)
        ),
        linear-gradient(180deg, rgba(41,182,255,.18), rgba(183,124,255,.08));
      background-blend-mode: screen, normal;
      border-color: rgba(41,182,255,.50);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 26px 64px rgba(0,0,0,.62),
        0 0 52px rgba(41,182,255,.28),
        0 0 38px rgba(183,124,255,.16);
    }

    /* Primary 的霓虹描边更明显（默认就有一点，hover 直接拉满） */
    button.primary.neon-border::after{
      opacity:.35;
      background: linear-gradient(120deg,
        rgba(41,182,255,.0),
        rgba(41,182,255,.85),
        rgba(183,124,255,.85),
        rgba(51,255,204,.60),
        rgba(41,182,255,.0)
      );
    }
    button.primary.neon-border:hover::after{ opacity:1; }

    .status{
      margin-top:10px;
      text-align:center;
      font-size:12px;
      min-height:18px;
      position:relative;
      z-index:1;
    }
    .status.ok{ color:#4cd18c; }
    .status.err{ color:#ff6b6b; }

    .foot{
      margin-top:18px;
      text-align:center;
      color: rgba(154,168,198,.70);
      font-size: 12px;
      line-height:1.6;
      position:relative;
      z-index:1;
    }

    .neon-border:focus-visible, .nav a:focus-visible, input:focus-visible, button:focus-visible{
      outline:none;
      box-shadow:
        0 0 0 2px rgba(41,182,255,.42),
        0 0 0 6px rgba(41,182,255,.16);
    }

    /* ===== Mobile & Reduced Motion ===== */
    @media (max-width: 900px) {
      .header { width: 95%; padding: 10px 16px; }
      .header .nav { display: none; }
      .panel{ padding:20px 16px; }
      .row{ gap:10px; }
      button{ flex:1 1 100%; }
    }
    @media (max-width: 480px) {
      .header-actions .btn { display: none; }
    }

    @media (prefers-reduced-motion: reduce){
      .bg-animation::before, .bg-animation::after, .bg-animation-3 { animation:none !important; }
      .panel::after{ animation:none !important; opacity:.10 !important; }
      .scanlines{ opacity:.03 !important; }
    }
  </style>
</head>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // --- Background Rain Animation ---
      const canvas = document.getElementById('bg-canvas');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        let width, height;
        const drops = [];

        function initRain() {
          width = canvas.width = window.innerWidth || document.documentElement.clientWidth || 1080;
          height = canvas.height = window.innerHeight || document.documentElement.clientHeight || 1920;
          drops.length = 0;
          const numDrops = Math.floor(width / 15);
          for (let i = 0; i < numDrops; i++) {
            drops.push({
              x: Math.random() * width,
              y: Math.random() * height,
              speed: Math.random() * 1.5 + 0.5,
              length: Math.random() * 15 + 10,
              opacity: Math.random() * 0.4 + 0.1,
              color: Math.random() > 0.5 ? '41, 182, 255' : '183, 124, 255'
            });
          }
        }

        window.addEventListener('resize', initRain);
        window.addEventListener('load', initRain);
        initRain();

        function drawRain() {
          ctx.clearRect(0, 0, width, height);
          drops.forEach(drop => {
            ctx.beginPath();
            ctx.moveTo(drop.x, drop.y);
            ctx.lineTo(drop.x, drop.y + drop.length);
            ctx.strokeStyle = `rgba(${drop.color}, ${drop.opacity})`;
            ctx.lineWidth = 1;
            ctx.stroke();
            
            drop.y += drop.speed;
            if (drop.y > height) {
              drop.y = -drop.length;
              drop.x = Math.random() * width;
            }
          });
          requestAnimationFrame(drawRain);
        }
        drawRain();
      }
    });

      }
    };

    function detectLang(){
      const saved = localStorage.getItem(LANG_KEY);
      if (saved && i18n[saved]) return saved;

      const nav = (navigator.language || "en").toLowerCase();
      if (nav.startsWith("zh")) return "zh";
      if (nav.startsWith("fr")) return "fr";
      if (nav.startsWith("de")) return "de";
      if (nav.startsWith("ar")) return "ar";
      return "en";
    }

    let currentLang = detectLang();
    function t(key){
      return (i18n[currentLang] && i18n[currentLang][key]) || i18n.en[key] || key;
    }

    function applyLang(lang){
      if (!i18n[lang]) lang = "en";
      currentLang = lang;

      document.documentElement.lang = lang;
      document.documentElement.dir  = (lang === "ar" ? "rtl" : "ltr");

      const sel = document.getElementById("langSelect");
      if (sel) sel.value = lang;

      document.getElementById("navHome").textContent = i18n[lang].nav.home;
      if(document.getElementById("navAccounts")) document.getElementById("navAccounts").textContent = i18n[lang].nav.accounts;
      document.getElementById("navServices").textContent = i18n[lang].nav.services;
      document.getElementById("navWarranty").textContent = i18n[lang].nav.warranty;
      document.getElementById("navFaq").textContent = i18n[lang].nav.faq;
      document.getElementById("navContact").textContent = i18n[lang].nav.contact;

      document.getElementById("backBtnText").textContent = i18n[lang].back;

      document.getElementById("panelTitleText").textContent = i18n[lang].panelTitle;
      document.getElementById("secretLabel").textContent = i18n[lang].secretLabel;
      document.getElementById("secret").placeholder = i18n[lang].placeholder;
      document.getElementById("copy").textContent = i18n[lang].copy;
      document.getElementById("clear").textContent = i18n[lang].clear;
      document.getElementById("footer").textContent = i18n[lang].footer;
    }

    applyLang(currentLang);
    document.getElementById("langSelect").addEventListener("change", e=>{
      const lang = e.target.value;
      applyLang(lang);
      localStorage.setItem(LANG_KEY, lang);
      gen();
    });

    function getKeyFromURL(){
      const u = new URL(location.href);
      const paramKey = u.searchParams.get("key");
      if (paramKey && /^[0-9a-fA-F]+$/.test(paramKey)) return paramKey;

      const parts = u.pathname.split("/").filter(Boolean);
      if (parts.length){
        const last = parts[parts.length - 1];
        if (/^[0-9a-fA-F]+$/.test(last)) return last;
      }
      return null;
    }

    const $ = id => document.getElementById(id);

    function hexToBytes(s){
      s = s.trim().replace(/^0x/i,"").replace(/[^0-9a-f]/ig,"");
      if (!s) throw new Error("ERR_EMPTY_KEY");
      if (s.length % 2) throw new Error("ERR_INVALID_KEY");
      return Uint8Array.from(s.match(/../g).map(x => parseInt(x,16)));
    }
    function counterBytes(c){
      const b = new Uint8Array(8); let x = BigInt(c);
      for (let i = 7; i >= 0; i--){
        b[i] = Number(x & 0xffn);
        x >>= 8n;
      }
      return b;
    }
    async function hmacSha1(key,msg){
      const k = await crypto.subtle.importKey("raw", key, {name:"HMAC", hash:"SHA-1"}, false, ["sign"]);
      return new Uint8Array(await crypto.subtle.sign("HMAC",k,msg));
    }
    function truncate(mac){
      const o = mac[mac.length - 1] & 0x0f;
      return (((mac[o]   & 0x7f) << 24) |
              ((mac[o+1] & 0xff) << 16) |
              ((mac[o+2] & 0xff) << 8)  |
              ( mac[o+3] & 0xff)) >>> 0;
    }
    function fmt(n){
      const raw = (n % (10**DIGITS)).toString().padStart(DIGITS, "0");
      return raw.slice(0,4) + " " + raw.slice(4);
    }

    async function gen(){
      const statusEl = $("status");
      try{
        const key = hexToBytes($("secret").value);
        const ctr = Math.floor(Date.now()/1000 / PERIOD);
        const mac = await hmacSha1(key, counterBytes(ctr));
        $("code").textContent = fmt(truncate(mac));
        if (statusEl){
          statusEl.textContent = "";
          statusEl.classList.remove("err","ok");
        }
      }catch(e){
        $("code").textContent = "--------";
        if (!statusEl) return;
        let msg;
        if (e.message === "ERR_EMPTY_KEY") msg = t("enterKeyError");
        else if (e.message === "ERR_INVALID_KEY") msg = t("invalidKey");
        else msg = e.message;
        statusEl.textContent = msg;
        statusEl.classList.add("err");
        statusEl.classList.remove("ok");
      }
    }

    function tick(){
      const s   = Math.floor(Date.now()/1000);
      const rem = PERIOD - (s % PERIOD);
      $("remain").textContent = `${rem}s`;
      $("bar").style.width    = ((PERIOD - rem) / PERIOD * 100) + "%";
    }

    let last = -1;
    setInterval(() => {
      tick();
      const s = Math.floor(Date.now()/1000);
      if (s !== last){
        last = s;
        gen();
      }
    }, 150);

    $("secret").addEventListener("input", gen);

    $("copy").addEventListener("click", async () => {
      const v = $("code").textContent;
      const statusEl = $("status");
      if (v.includes("-")) return;
      try{
        await navigator.clipboard.writeText(v.replace(/\s/g,""));
        if (statusEl){
          statusEl.textContent = t("copied");
          statusEl.classList.remove("err");
          statusEl.classList.add("ok");
        }
      }catch{
        if (statusEl){
          statusEl.textContent = t("copyBlocked");
          statusEl.classList.remove("ok");
          statusEl.classList.add("err");
        }
      }
    });

    $("clear").addEventListener("click", () => {
      $("secret").value = "";
      $("code").textContent = "--------";
      const statusEl = $("status");
      if (statusEl){
        statusEl.textContent = "";
        statusEl.classList.remove("err","ok");
      }
    });

    const urlKey = getKeyFromURL();
    if (urlKey) $("secret").value = urlKey;

    tick();
    gen();
  </script>
</body>
</html>
